#############################################
# APPLICATION CONFIGURATION
#############################################

# Application name shown in logs and Spring context
spring.application.name=employeehub

# Import environment variables from .env file
# Useful for hiding credentials like DB username/password
spring.config.import=optional:file:.env[.properties]



#############################################
# DATABASE CONFIGURATION
#############################################

# Database connection URL
spring.datasource.url=${DB_URL}

# Database username
spring.datasource.username=${DB_USERNAME}

# Database password
spring.datasource.password=${DB_PASSWORD}

# MariaDB JDBC Driver
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver



#############################################
# HIBERNATE / JPA CONFIGURATION
#############################################

# Automatically updates database schema
#
# Common values:
# create       -> Drops and recreates tables every startup
# create-drop  -> Creates tables and drops on shutdown
# update       -> Updates schema without deleting data
# validate     -> Validates schema only
# none         -> Disables DDL handling
#
# Recommended:
# Development  -> update
# Production   -> validate OR none
spring.jpa.hibernate.ddl-auto=update

# Hibernate dialect for MariaDB
# Helps Hibernate generate optimized SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Show generated SQL queries in console
# Useful during development/debugging
#
# Disable in production because:
# - pollutes logs
# - may expose sensitive queries
spring.jpa.show-sql=true

# Formats SQL output into readable structure
# Makes debugging easier
spring.jpa.properties.hibernate.format_sql=true



#############################################
# HIBERNATE SQL LOGGING
#############################################

# Logs actual SQL queries generated by Hibernate
#
# Example:
# select * from posts where id=?
#
# Recommended:
# Development  -> DEBUG
# Production   -> OFF or WARN
logging.level.org.hibernate.SQL=DEBUG

# Logs bind parameter values
#
# Example:
# binding parameter [1] as [VARCHAR] - [Spring Boot]
#
# Extremely useful for debugging
#
# WARNING:
# Disable in production because:
# - huge log generation
# - performance overhead
# - sensitive data exposure
logging.level.org.hibernate.orm.jdbc.bind=DEBUG
