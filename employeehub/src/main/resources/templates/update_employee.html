<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>EmployeeHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>
	<div class="container">
			<h1>EmployeeHub</h1>
			<hr>
			<h2>Update Employee</h2>
			
			<form action="#" th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
				
				<!-- ADD HIDDEN FORM FIELD TO HANDLE UPDATE -->
				<input type="hidden" th:field="*{id}" />
			
				<input type="text" th:field="*{firstName}" required class="form-control mb-4 col-4">
				
				<input type="text" th:field="*{lastName}" class="form-control mb-4 col-4">
				
				<input type="email" th:field="*{email}" required class="form-control mb-4 col-4">
				
				<button type="submit" class="btn btn-dark">Update</button>
				
			</form>
			
			<hr>
			
			<a th:href="@{/}">Back To Employee List</a>
			
		</div>
</body>
</html>
