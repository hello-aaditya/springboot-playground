<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>EmployeeHub - Update Employee</title>

	<!-- Bootstrap 5.0.2 CDN -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
		crossorigin="anonymous">

	<!-- Custom Universal Dark UI stylesheet -->
	<link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

	<div class="container py-5">
		
		<div class="row justify-content-center">
			<div class="col-lg-6 col-md-8">
				
				<!-- Heading/Navigation -->
				<div class="text-center mb-4">
					<h1 class="text-white fw-bold mb-2">EmployeeHub</h1>
					<p class="text-muted">Modify existing employee details</p>
				</div>

				<!-- Form Card -->
				<div class="card main-card shadow-lg border-0">
					<div class="card-body p-4 p-sm-5">
						
						<h3 class="card-title text-center text-white mb-4">Update Employee</h3>
						
						<form th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
							
							<!-- Hidden input field to handle Spring Data JPA Update -->
							<input type="hidden" th:field="*{id}" />
							
							<!-- First Name Input -->
							<div class="mb-4">
								<label for="firstName" class="form-label text-white-50 small fw-bold mb-2">First Name</label>
								<input type="text" 
									id="firstName"
									th:field="*{firstName}" 
									placeholder="First Name" 
									required 
									class="form-control form-control-dark">
							</div>
							
							<!-- Last Name Input -->
							<div class="mb-4">
								<label for="lastName" class="form-label text-white-50 small fw-bold mb-2">Last Name</label>
								<input type="text" 
									id="lastName"
									th:field="*{lastName}" 
									placeholder="Last Name" 
									required
									class="form-control form-control-dark">
							</div>
							
							<!-- Email Input -->
							<div class="mb-5">
								<label for="email" class="form-label text-white-50 small fw-bold mb-2">Email Address</label>
								<input type="email" 
									id="email"
									th:field="*{email}" 
									placeholder="Email Address" 
									required 
									class="form-control form-control-dark">
							</div>
							
							<!-- Action Buttons -->
							<div class="d-grid gap-3">
								<button type="submit" class="btn btn-info-custom py-2.5 fs-5">Update Details</button>
								<a th:href="@{/}" class="btn btn-outline-light-custom py-2.5 text-center">Cancel & Back</a>
							</div>

						</form>

					</div>
				</div>

			</div>
		</div>

	</div>

</body>

</html>
