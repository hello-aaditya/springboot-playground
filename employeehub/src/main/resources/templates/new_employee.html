<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<title>EmployeeHub</title>
		
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	</head>
	<body>
		<div class="container">
			<h1>EmployeeHub</h1>
			<hr>
			<h2>Save Employee</h2>
			
			<form action="#" th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
				<input type="text" th:field="*{firstName}" placeholder="First Name" required class="form-control mb-4">
				
				<input type="text" th:field="*{lastName}" placeholder="Last Name" class="form-control mb-4">
				
				<input type="email" th:field="*{email}" placeholder="email" required class="form-control mb-4">
				
				<button type="submit" class="btn btn-info col-2">Save</button>
			</form>
			
		</div>
	</body>
</html>
