<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>EmployeeHub - Dashboard</title>

	<!-- Bootstrap 5.0.2 CDN -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
		crossorigin="anonymous">

	<!-- Custom Universal Dark UI stylesheet -->
	<link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

	<div class="container py-5">

		<!-- Top Header Area -->
		<div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-5">
			<div>
				<h1 class="display-5 mb-1 text-white fw-bold">EmployeeHub</h1>
				<p class="text-muted mb-0">Manage your workforce with absolute ease and elegance.</p>
			</div>
			<div>
				<a th:href="@{/showNewEmployeeForm}"
					class="btn btn-success-custom px-4 py-2 shadow-sm d-inline-flex align-items-center gap-2">
					<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-person-plus-fill" viewBox="0 0 16 16">
						<path d="M1 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
						<path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5z"/>
					</svg>
					Add Employee
				</a>
			</div>
		</div>

		<!-- Main Workspace Card -->
		<div class="card main-card shadow-lg border-0 mb-4">
			<div class="card-body p-0">
				<div class="table-responsive">
					<table class="table table-dark-custom align-middle mb-0">
						<thead>
							<tr>
								<th class="ps-4">
									<a class="sort-link"
										th:href="@{/page/{pageNo}(
										pageNo=1,
										sortField='firstName',
										sortDir=${sortField == 'firstName' ? reverseSortDir : 'asc'})}">
										First Name
										<span th:if="${sortField == 'firstName'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}" class="text-primary small ms-1"></span>
									</a>
								</th>
								<th>
									<a class="sort-link"
										th:href="@{/page/{pageNo}(
										pageNo=1,
										sortField='lastName',
										sortDir=${sortField == 'lastName' ? reverseSortDir : 'asc'})}">
										Last Name
										<span th:if="${sortField == 'lastName'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}" class="text-primary small ms-1"></span>
									</a>
								</th>
								<th>
									<a class="sort-link"
										th:href="@{/page/{pageNo}(
										pageNo=1,
										sortField='email',
										sortDir=${sortField == 'email' ? reverseSortDir : 'asc'})}">
										Email Address
										<span th:if="${sortField == 'email'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}" class="text-primary small ms-1"></span>
									</a>
								</th>
								<th class="text-center pe-4" width="220">Actions</th>
							</tr>
						</thead>
						<tbody>
							<!-- Empty state handling -->
							<tr th:if="${#lists.isEmpty(listEmployees)}">
								<td colspan="4" class="text-center py-5 text-muted">
									<p class="mb-0 fs-5">No employees found in the hub.</p>
								</td>
							</tr>
							<!-- Employee Rows -->
							<tr th:each="employee : ${listEmployees}">
								<td class="ps-4 fw-semibold text-white" th:text="${employee.firstName}"></td>
								<td class="text-white" th:text="${employee.lastName}"></td>
								<td class="text-muted" th:text="${employee.email}"></td>
								<td class="text-center pe-4">
									<div class="d-inline-flex gap-2">
										<a th:href="@{/showFormForUpdate/{id}(id=${employee.id})}"
											class="btn btn-outline-light-custom btn-sm">
											Update
										</a>
										<a th:href="@{/deleteEmployee/{id}(id=${employee.id})}"
											class="btn btn-outline-danger-custom btn-sm"
											onclick="return confirm('Are you sure you want to delete this employee?');">
											Delete
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<!-- PAGINATION COMPONENT -->
		<div th:if="${totalPages > 1}" class="card pagination-card-custom border-0 shadow">
			<div class="card-body py-3 px-4">
				<div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
					
					<div class="text-muted small">
						Showing total <span class="fw-bold text-white">[[${totalItems}]]</span> records
					</div>

					<div class="d-flex align-items-center gap-1">
						
						<!-- FIRST PAGE -->
						<a class="pagination-link-custom btn btn-link"
							th:if="${currentPage > 1}"
							th:href="@{/page/{pageNo}(
							pageNo=1,
							sortField=${sortField},
							sortDir=${sortDir})}">
							First
						</a>
						<span class="text-secondary px-2 small" th:unless="${currentPage > 1}">First</span>

						<!-- PREVIOUS PAGE -->
						<a class="pagination-link-custom btn btn-link me-2"
							th:if="${currentPage > 1}"
							th:href="@{/page/{pageNo}(
							pageNo=${currentPage - 1},
							sortField=${sortField},
							sortDir=${sortDir})}">
							&laquo; Prev
						</a>
						<span class="text-secondary px-2 small me-2" th:unless="${currentPage > 1}">&laquo; Prev</span>

						<!-- PAGE NUMBERS -->
						<span th:each="i : ${#numbers.sequence(1, totalPages)}">
							<a class="pagination-link-custom"
								th:if="${currentPage != i}"
								th:href="@{/page/{pageNo}(
								pageNo=${i},
								sortField=${sortField},
								sortDir=${sortDir})}">
								[[${i}]]
							</a>
							<span class="pagination-current-custom" th:unless="${currentPage != i}">
								[[${i}]]
							</span>
						</span>

						<!-- NEXT PAGE -->
						<a class="pagination-link-custom btn btn-link ms-2"
							th:if="${currentPage < totalPages}"
							th:href="@{/page/{pageNo}(
							pageNo=${currentPage + 1},
							sortField=${sortField},
							sortDir=${sortDir})}">
							Next &raquo;
						</a>
						<span class="text-secondary px-2 small ms-2" th:unless="${currentPage < totalPages}">Next &raquo;</span>

						<!-- LAST PAGE -->
						<a class="pagination-link-custom btn btn-link"
							th:if="${currentPage < totalPages}"
							th:href="@{/page/{pageNo}(
							pageNo=${totalPages},
							sortField=${sortField},
							sortDir=${sortDir})}">
							Last
						</a>
						<span class="text-secondary px-2 small" th:unless="${currentPage < totalPages}">Last</span>

					</div>

				</div>
			</div>
		</div>

	</div>

</body>

</html>
