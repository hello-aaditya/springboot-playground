<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>EmployeeHub</title>

	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
		crossorigin="anonymous">

</head>

<body>

	<div class="container my-2">

		<h1>Employee List</h1>

		<a th:href="@{/showNewEmployeeForm}"
			class="btn btn-dark mb-3">
			Add Employee
		</a>

		<table class="table table-striped table-responsive-md">

			<thead>

				<tr>

					<th>
						<a th:href="@{/page/{pageNo}(
								pageNo=1,
								sortField='firstName',
								sortDir=${sortField == 'firstName' ? reverseSortDir : 'asc'})}">
							First Name
						</a>
					</th>

					<th>
						<a th:href="@{/page/{pageNo}(
								pageNo=1,
								sortField='lastName',
								sortDir=${sortField == 'lastName' ? reverseSortDir : 'asc'})}">
							Last Name
						</a>
					</th>

					<th>
						<a th:href="@{/page/{pageNo}(
								pageNo=1,
								sortField='email',
								sortDir=${sortField == 'email' ? reverseSortDir : 'asc'})}">
							Email
						</a>
					</th>

					<th>Actions</th>

				</tr>

			</thead>

			<tbody>

				<tr th:each="employee : ${listEmployees}">

					<td th:text="${employee.firstName}"></td>

					<td th:text="${employee.lastName}"></td>

					<td th:text="${employee.email}"></td>

					<td>

						<a th:href="@{/showFormForUpdate/{id}(id=${employee.id})}"
							class="btn btn-dark">
							Update
						</a>

						<a th:href="@{/deleteEmployee/{id}(id=${employee.id})}"
							class="btn btn-danger">
							Delete
						</a>

					</td>

				</tr>

			</tbody>

		</table>

		<!-- PAGINATION -->

		<div th:if="${totalPages > 1}">

			<div class="row col-sm-10">

				<!-- TOTAL ROWS -->

				<div class="col-sm-2">
					Total Rows: [[${totalItems}]]
				</div>

				<!-- FIRST PAGE -->

				<div class="col-sm-1">

					<a th:if="${currentPage > 1}"
						th:href="@{/page/{pageNo}(
								pageNo=1,
								sortField=${sortField},
								sortDir=${sortDir})}">
						First
					</a>

					<span th:unless="${currentPage > 1}">
						First
					</span>

				</div>

				<!-- PREVIOUS PAGE -->

				<div class="col-sm-1">

					<a th:if="${currentPage > 1}"
						th:href="@{/page/{pageNo}(
								pageNo=${currentPage - 1},
								sortField=${sortField},
								sortDir=${sortDir})}">
						Previous
					</a>

					<span th:unless="${currentPage > 1}">
						Previous
					</span>

				</div>

				<!-- PAGE NUMBERS -->

				<div class="col-sm-4">

					<span th:each="i : ${#numbers.sequence(1, totalPages)}">

						<a th:if="${currentPage != i}"
							th:href="@{/page/{pageNo}(
									pageNo=${i},
									sortField=${sortField},
									sortDir=${sortDir})}">

							[[${i}]]

						</a>

						<span th:unless="${currentPage != i}">
							[[${i}]]
						</span>

						&nbsp;&nbsp;

					</span>

				</div>

				<!-- NEXT PAGE -->

				<div class="col-sm-1">

					<a th:if="${currentPage < totalPages}"
						th:href="@{/page/{pageNo}(
								pageNo=${currentPage + 1},
								sortField=${sortField},
								sortDir=${sortDir})}">
						Next
					</a>

					<span th:unless="${currentPage < totalPages}">
						Next
					</span>

				</div>

				<!-- LAST PAGE -->

				<div class="col-sm-1">

					<a th:if="${currentPage < totalPages}"
						th:href="@{/page/{pageNo}(
								pageNo=${totalPages},
								sortField=${sortField},
								sortDir=${sortDir})}">
						Last
					</a>

					<span th:unless="${currentPage < totalPages}">
						Last
					</span>

				</div>

			</div>

		</div>

	</div>

</body>

</html>
